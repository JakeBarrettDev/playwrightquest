<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — Bramble &amp; Co.</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">Bramble &amp; Co.</a>
      <nav aria-label="Main">
        <ul>
          <li><a href="index.html">Shop</a></li>
          <li>
            <a href="cart.html" data-testid="cart-link">
              Cart (<span id="cart-count" data-testid="cart-count">0</span>)
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container checkout-layout">
    <h1>Checkout</h1>

    <section id="order-confirmation" class="confirmation" hidden aria-live="polite">
      <h2>Order Confirmed</h2>
      <p>Order #<span id="order-number" data-testid="order-number"></span></p>
      <p>Thank you for your purchase.</p>
    </section>

    <form id="checkout-form" aria-labelledby="payment-heading" novalidate>
      <h2 id="payment-heading">Payment Details</h2>

      <label for="full-name">Full name
        <input type="text" id="full-name" name="fullName" autocomplete="name" required />
      </label>

      <label for="email">Email
        <input type="email" id="email" name="email" autocomplete="email" required />
      </label>

      <label for="address">Street address
        <input type="text" id="address" name="address" autocomplete="street-address" required />
      </label>

      <label for="city">City
        <input type="text" id="city" name="city" autocomplete="address-level2" required />
      </label>

      <input type="text" id="zip" name="zip" placeholder="ZIP code" autocomplete="postal-code" required />

      <label for="card-number">Card number
        <input type="text" id="card-number" name="cardNumber" autocomplete="cc-number" inputmode="numeric" required />
      </label>

      <label for="exp">Expiration (MM/YY)
        <input type="text" id="exp" name="exp" autocomplete="cc-exp" required />
      </label>

      <label for="cvv">CVV
        <input type="text" id="cvv" name="cvv" autocomplete="cc-csc" inputmode="numeric" required />
      </label>

      <button type="submit" id="submit-order" data-testid="checkout-submit" class="btn primary btn-dynamic">
        Complete Purchase
      </button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
